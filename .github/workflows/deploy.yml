name: Auto Deploy to Tencent Cloud

on:
  push:
    branches:
      - main

jobs:
  # 阶段 1: 自动编译构建验证 (Build)
  build:
    name: Build & Verify Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Compile Frontend Assets
        run: npm run build

  # 阶段 2: 登录服务器部署应用 (Deploy)
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build  # 只有当 build 编译成功后，才会执行部署

    steps:
      - name: SSH Deploy Command
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/gis-review
            # 拉取最新代码
            git pull origin main
            # 停止并重新无缓存构建启动 Docker 容器
            docker-compose down
            docker-compose up --build -d
            # 清理无用的镜像缓存
            docker system prune -f
